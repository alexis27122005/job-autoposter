[phases.setup]
nixPkgs = ["python311", "postgresql", "redis"]

[phases.install]
cmds = ["cd backend && pip install -r requirements.txt"]

[phases.build]
cmds = ["cd backend && python manage.py collectstatic --noinput"]

[start]
cmd = "cd backend && gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT"

[phases.migrate]
cmds = ["cd backend && python manage.py migrate"]

[deploy]
startCmd = "cd backend && gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT"