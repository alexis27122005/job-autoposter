<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Autoposter - Postulación Automática Inteligente</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        /* Cards */
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        /* Formularios */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s;
            width: 100%;
        }

        button:hover {
            transform: scale(1.02);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            margin-top: 10px;
        }

        /* Grid para ofertas */
        .ofertas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .oferta-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .oferta-card h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .oferta-card p {
            color: #666;
            margin: 5px 0;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            background: #667eea;
            color: white;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 10px;
        }

        /* Alertas */
        .alert {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 20px;
            display: none;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
            
            .card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Job Autoposter</h1>
            <p>Postulación automática a 100 empleos diarios</p>
        </div>

        <!-- Alertas -->
        <div id="alert" class="alert"></div>

        <!-- Login/Registro -->
        <div id="authSection" class="card">
            <h2>🎯 Comienza tu camino laboral</h2>
            <div class="form-group">
                <label>👤 Usuario</label>
                <input type="text" id="username" placeholder="Elige un nombre de usuario">
            </div>
            <div class="form-group">
                <label>📧 Email</label>
                <input type="email" id="email" placeholder="tu@email.com">
            </div>
            <div class="form-group">
                <label>🔒 Contraseña</label>
                <input type="password" id="password" placeholder="Mínimo 6 caracteres">
            </div>
            <button onclick="registrar()">📝 Registrarme</button>
            <button onclick="login()" class="btn-secondary">🔑 Iniciar Sesión</button>
        </div>

        <!-- Panel de Usuario (oculto inicialmente) -->
        <div id="panelSection" style="display: none;">
            <div class="card">
                <h2>⚙️ Configuración de Postulación</h2>
                <div class="form-group">
                    <label>📄 Subir CV (PDF o Word)</label>
                    <input type="file" id="cv" accept=".pdf,.doc,.docx">
                </div>
                <div class="form-group">
                    <label>🌍 País de residencia</label>
                    <select id="pais">
                        <option value="ar">Argentina</option>
                        <option value="us">Estados Unidos</option>
                        <option value="es">España</option>
                        <option value="mx">México</option>
                        <option value="co">Colombia</option>
                        <option value="cl">Chile</option>
                        <option value="pe">Perú</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>⏰ Hora de postulación (hora local)</label>
                    <input type="time" id="hora" value="09:00">
                </div>
                <div class="form-group">
                    <label>🏢 Modalidades de trabajo</label>
                    <label><input type="checkbox" value="full-time"> Full-time</label>
                    <label><input type="checkbox" value="part-time"> Part-time</label>
                    <label><input type="checkbox" value="remoto"> Remoto</label>
                    <label><input type="checkbox" value="presencial"> Presencial</label>
                    <label><input type="checkbox" value="hibrido"> Híbrido</label>
                </div>
                <button onclick="guardarPreferencias()">💾 Guardar Configuración</button>
                <button onclick="probarPostulacion()" class="btn-secondary" style="margin-top: 10px;">▶️ Probar Postulación Ahora</button>
            </div>

            <div class="card">
                <h2>📊 Estadísticas</h2>
                <div id="stats">
                    <p><strong>Total postulaciones hoy:</strong> <span id="totalHoy">0</span></p>
                    <p><strong>Próxima postulación:</strong> <span id="proximaHora">--:--</span></p>
                </div>
            </div>

            <div class="card">
                <h2>📋 Historial de Postulaciones</h2>
                <div id="historial"></div>
                <div id="loadingHistorial" class="loading">
                    <div class="spinner"></div>
                    <p>Cargando historial...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let token = localStorage.getItem('token');
        const API_URL = window.location.origin;

        // Verificar si ya hay sesión
        if(token) {
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('panelSection').style.display = 'block';
            cargarHistorial();
            cargarEstadisticas();
        }

        // Mostrar alerta
        function mostrarAlerta(mensaje, tipo = 'success') {
            const alertDiv = document.getElementById('alert');
            alertDiv.className = `alert alert-${tipo}`;
            alertDiv.innerHTML = mensaje;
            alertDiv.style.display = 'block';
            setTimeout(() => {
                alertDiv.style.display = 'none';
            }, 5000);
        }

        // Registrar usuario
        async function registrar() {
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if(!username || !email || !password) {
                mostrarAlerta('Por favor completa todos los campos', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/registro/`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, email, password})
                });
                
                if(response.ok) {
                    mostrarAlerta('✅ Registro exitoso. Ahora inicia sesión', 'success');
                } else {
                    mostrarAlerta('❌ Error en el registro. Usuario puede existir', 'error');
                }
            } catch(error) {
                mostrarAlerta('Error de conexión', 'error');
            }
        }

        // Iniciar sesión
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_URL}/api/login/`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                
                if(response.ok) {
                    const data = await response.json();
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('username', username);
                    mostrarAlerta('🎉 Bienvenido ' + username + '!', 'success');
                    setTimeout(() => location.reload(), 1500);
                } else {
                    mostrarAlerta('❌ Usuario o contraseña incorrectos', 'error');
                }
            } catch(error) {
                mostrarAlerta('Error de conexión', 'error');
            }
        }

        // Guardar preferencias
        async function guardarPreferencias() {
            const pais = document.getElementById('pais').value;
            const hora = document.getElementById('hora').value;
            const cvFile = document.getElementById('cv').files[0];
            
            const formData = new FormData();
            formData.append('pais', pais);
            formData.append('hora_postulacion', hora);
            if(cvFile) formData.append('cv', cvFile);

            // Obtener modalidades seleccionadas
            const modalidades = [];
            document.querySelectorAll('#modalidades input:checked').forEach(cb => {
                modalidades.push(cb.value);
            });
            formData.append('modalidades', JSON.stringify(modalidades));

            try {
                const response = await fetch(`${API_URL}/api/perfil/`, {
                    method: 'PUT',
                    headers: {'Authorization': `Token ${localStorage.getItem('token')}`},
                    body: formData
                });
                
                if(response.ok) {
                    mostrarAlerta('✅ Preferencias guardadas correctamente', 'success');
                    cargarEstadisticas();
                } else {
                    mostrarAlerta('❌ Error al guardar', 'error');
                }
            } catch(error) {
                mostrarAlerta('Error de conexión', 'error');
            }
        }

        // Probar postulación
        async function probarPostulacion() {
            mostrarAlerta('🚀 Iniciando prueba de postulación...', 'success');
            
            try {
                const response = await fetch(`${API_URL}/api/probar/`, {
                    method: 'POST',
                    headers: {'Authorization': `Token ${localStorage.getItem('token')}`}
                });
                
                if(response.ok) {
                    mostrarAlerta('✅ Prueba iniciada. Revisa el historial en unos segundos', 'success');
                    setTimeout(() => cargarHistorial(), 5000);
                } else {
                    mostrarAlerta('❌ Error al iniciar prueba', 'error');
                }
            } catch(error) {
                mostrarAlerta('Error de conexión', 'error');
            }
        }

        // Cargar historial
        async function cargarHistorial() {
            const historialDiv = document.getElementById('historial');
            const loadingDiv = document.getElementById('loadingHistorial');
            loadingDiv.style.display = 'block';
            
            try {
                const response = await fetch(`${API_URL}/api/historial/`, {
                    headers: {'Authorization': `Token ${localStorage.getItem('token')}`}
                });
                
                if(response.ok) {
                    const data = await response.json();
                    loadingDiv.style.display = 'none';
                    
                    if(data.length === 0) {
                        historialDiv.innerHTML = '<p style="text-align:center; color:#999;">📭 Aún no hay postulaciones. Prueba el botón "Probar Postulación"</p>';
                        return;
                    }
                    
                    historialDiv.innerHTML = '<div class="ofertas-grid">';
                    data.forEach(p => {
                        historialDiv.innerHTML += `
                            <div class="oferta-card">
                                <h3>${p.titulo}</h3>
                                <p>🏢 ${p.empresa}</p>
                                <p>📅 ${new Date(p.fecha_postulacion).toLocaleDateString('es-ES')}</p>
                                <span class="badge">${p.modalidad}</span>
                                ${p.link ? `<a href="${p.link}" target="_blank" style="display:inline-block; margin-top:10px; color:#667eea;">Ver oferta →</a>` : ''}
                            </div>
                        `;
                    });
                    historialDiv.innerHTML += '</div>';
                }
            } catch(error) {
                loadingDiv.style.display = 'none';
                historialDiv.innerHTML = '<p style="color:red;">Error al cargar historial</p>';
            }
        }

        // Cargar estadísticas
        async function cargarEstadisticas() {
            try {
                const response = await fetch(`${API_URL}/api/estadisticas/`, {
                    headers: {'Authorization': `Token ${localStorage.getItem('token')}`}
                });
                
                if(response.ok) {
                    const data = await response.json();
                    document.getElementById('totalHoy').innerText = data.total_hoy || 0;
                    document.getElementById('proximaHora').innerText = data.proxima_hora || '09:00';
                }
            } catch(error) {
                console.log('Error cargando estadísticas');
            }
        }

        // Actualizar cada 30 segundos
        if(token) {
            setInterval(() => {
                cargarHistorial();
                cargarEstadisticas();
            }, 30000);
        }
    </script>
</body>
</html>
